server:
  port: 8080

spring:
  application:
    name: kaoyan-peipao

  datasource:
    url: jdbc:mysql://localhost:3306/kaoyan_peipao?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  cache:
    type: simple

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# WxJava
wx:
  miniapp:
    appid: wx16cae95889539ba6
    secret: d2476e40bc5799eee5106d1d77b738bb

# STT (Speech-to-Text)
app:
  stt:
    python-path: python
    script-path: scripts/stt.py
    timeout-seconds: 10
    ffmpeg-path: ffmpeg

# DeepSeek LLM
deepseek:
  api-key: sk-31de77140ec64523b8c2610b1ce7b97f
  base-url: https://api.deepseek.com
  model: deepseek-chat
  timeout: 10000

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true

# Multipart file upload config (for voice recognition)
spring.servlet.multipart:
  enabled: true
  max-file-size: 5MB
  max-request-size: 5MB