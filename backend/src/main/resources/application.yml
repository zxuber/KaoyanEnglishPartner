server:
  port: ${SERVER_PORT:8080}
  address: ${SERVER_ADDRESS:0.0.0.0}

spring:
  application:
    name: kaoyan-peipao

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kaoyan_peipao?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  cache:
    type: simple

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# WxJava
wx:
  miniapp:
    appid: ${WX_MINIAPP_APPID:wx16cae95889539ba6}
    secret: ${WX_MINIAPP_SECRET:d2476e40bc5799eee5106d1d77b738bb}

# STT (Speech-to-Text)
app:
  stt:
    python-command: ${APP_STT_PYTHON_COMMAND:}
    script-path: ${APP_STT_SCRIPT_PATH:scripts/stt.py}
    timeout-seconds: ${APP_STT_TIMEOUT_SECONDS:10}
    ffmpeg-path: ${APP_STT_FFMPEG_PATH:ffmpeg}

# DeepSeek LLM
deepseek:
  api-key: ${DEEPSEEK_API_KEY:}
  base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
  model: ${DEEPSEEK_MODEL:deepseek-chat}
  timeout: ${DEEPSEEK_TIMEOUT:10000}

# Knife4j
springdoc:
  swagger-ui:
    path: /swagger-ui.html

knife4j:
  enable: true

# Multipart file upload config (for voice recognition)
spring.servlet.multipart:
  enabled: true
  max-file-size: 5MB
  max-request-size: 5MB
